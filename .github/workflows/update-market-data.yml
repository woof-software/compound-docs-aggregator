name: Update market data

on:
  workflow_dispatch:
  schedule:
    - cron: '2 12 * * *' # every day at 12:02 UTC

permissions:
  contents: write

concurrency:
  group: update-market-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout org repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Enable Corepack (Yarn 4)
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate
          yarn --version

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run data generation
        env:
          RPC_MAINNET: ${{ secrets.RPC_MAINNET }}
          RPC_OPTIMISM: ${{ secrets.RPC_OPTIMISM }}
          RPC_UNICHAIN: ${{ secrets.RPC_UNICHAIN }}
          RPC_POLYGON: ${{ secrets.RPC_POLYGON }}
          RPC_RONIN: ${{ secrets.RPC_RONIN }}
          RPC_MANTLE: ${{ secrets.RPC_MANTLE }}
          RPC_BASE: ${{ secrets.RPC_BASE }}
          RPC_ARBITRUM: ${{ secrets.RPC_ARBITRUM }}
          RPC_LINEA: ${{ secrets.RPC_LINEA }}
          RPC_SCROLL: ${{ secrets.RPC_SCROLL }}
          RPC_AVALANCHE: ${{ secrets.RPC_AVALANCHE }}
          RPC_SEPOLIA: ${{ secrets.RPC_SEPOLIA }}
          RPC_FUJI: ${{ secrets.RPC_FUJI }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn cli:generate:md

      - name: Commit & Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"

          git add README.md output.json compound-finance/compound-3.md
          git diff --cached --quiet || git commit -m "chore: auto-update market data"
          git pull --rebase
          git push
